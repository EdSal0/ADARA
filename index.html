<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="shortcut icon" href="https://github.com/EdSal0/images/raw/c2e10e2a5f9b40257387fc1b7865b16ce2395c45/logo.ico" />
  <title>ADARA</title>
  <style>
    /* RESET Y ESTILO GENERAL */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #333a44; /* Gris oscuro para texto */
      background: #f5f7fa; /* blanco grisáceo */
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Fondo con ondas animadas */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #e8ebf0, #f5f7fa);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 180px;
      background: url('data:image/svg+xml;utf8,\
      <svg width="100%" height="180" viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg">\
        <path fill="%23001f5b" fill-opacity="0.15" d="M0,96L48,117.3C96,139,192,181,288,186.7C384,192,480,160,576,149.3C672,139,768,149,864,165.3C960,181,1056,203,1152,202.7C1248,203,1344,181,1392,170.7L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z">\
          <animate attributeName="d" dur="10s" repeatCount="indefinite"\
          values="M0,96L48,117.3C96,139,192,181,288,186.7C384,192,480,160,576,149.3C672,139,768,149,864,165.3C960,181,1056,203,1152,202.7C1248,203,1344,181,1392,170.7L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z;\
                  M0,80L48,96C96,112,192,144,288,165.3C384,187,480,197,576,181.3C672,165,768,123,864,117.3C960,112,1056,144,1152,154.7C1248,165,1344,155,1392,149.3L1440,144L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z;\
                  M0,96L48,117.3C96,139,192,181,288,186.7C384,192,480,160,576,149.3C672,139,768,149,864,165.3C960,181,1056,203,1152,202.7C1248,203,1344,181,1392,170.7L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z" />\
        </path>\
      </svg>') no-repeat bottom center;
      background-size: cover;
      z-index: -1;
    }

    /* Loader minimalista */
    #loader {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(245, 247, 250, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #001f5b;
      font-size: 1.8em;
      font-weight: 600;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
      z-index: 2000;
    }
    #loader span {
      margin-top: 20px;
      font-size: 0.9em;
      color: #003366;
    }
    #progress-bar {
      width: 280px;
      height: 12px;
      border-radius: 6px;
      background: #cbd6e8;
      overflow: hidden;
      box-shadow: 0 0 8px #849bcc inset;
      margin-top: 10px;
    }
    #progress-bar > div {
      height: 100%;
      background: linear-gradient(90deg, #002e7d, #004080);
      width: 0%;
      border-radius: 6px;
      box-shadow:
        0 0 10px #002e7d,
        0 0 20px #004080;
      animation: progressAnim 3s ease forwards;
    }
    @keyframes progressAnim {
      from { width: 0%; }
      to { width: 100%; }
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50px;
      background: #001f5bcc; /* semitransparente azul oscuro */
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      box-shadow: 0 2px 5px #000a3b88;
      z-index: 1000;
      gap: 12px;
      color: #e0e7ff;
    }
    #logo {
      font-weight: bold;
      font-size: 1.2em;
      color: #e0e7ff;
      user-select: none;
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #logo img {
      width: 28px;
      height: 28px;
      user-select: none;
      filter: drop-shadow(0 0 3px #4761a3);
    }
    #logo:hover {
      text-decoration: underline;
    }
    #controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-grow: 1;
      justify-content: flex-end;
      position: relative;
    }
    #ubicacionBtn, #mundoBtn {
      background: none;
      border: none;
      color: #c3cdfd;
      font-size: 1em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      user-select: none;
      position: relative;
      padding: 6px 12px;
      border-radius: 12px;
      transition: background-color 0.3s ease;
      box-shadow: 0 0 6px #001f5baa;
    }
    #ubicacionBtn img {
      width: 20px;
      height: 20px;
      user-select: none;
      filter: drop-shadow(0 0 2px #001f5b99);
    }
    #ubicacionBtn:hover, #mundoBtn:hover {
      background-color: #002b85cc;
      text-decoration: none;
      box-shadow: 0 0 14px #003aaf;
      color: #e0e7ff;
    }
    #menuPaises {
      position: absolute;
      top: 40px;
      right: 0;
      background: #001f5bcc;
      color: #e0e7ff;
      border-radius: 6px;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: 0 2px 10px #001435cc;
      display: none;
      width: 160px;
      z-index: 2000;
    }
    #menuPaises button {
      width: 100%;
      padding: 8px 10px;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      font-weight: 600;
      color: #b6c3ff;
      transition: background-color 0.25s ease;
    }
    #menuPaises button:hover {
      background: #003080ff;
    }

    /* Mensaje sitio turístico */
    #mensajeTuristicoHeader {
      color: #c3cdfd;
      font-weight: 600;
      max-width: 300px;
      opacity: 0;
      transition: opacity 0.5s ease;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 6px #596fa9;
    }
    #mensajeTuristicoHeader.show {
      opacity: 1;
    }
    #mensajeTuristicoHeader a {
      color: #a3b1ff;
      text-decoration: underline;
    }

    /* MAIN Y CARRUSEL */
    main {
      margin-top: 70px;
      display: flex;
      justify-content: center;
      width: 100%;
      flex-grow: 1;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .carrusel {
      position: relative;
      width: 400px;
      height: 250px;
      border-radius: 10px;
      box-shadow: 0 0 15px #001f5b77;
      overflow: hidden;
      background: #e7e9f3cc;
    }
    .imagen-activa {
      width: 100%;
      height: 100%;
      cursor: pointer;
      user-select: none;
      object-fit: cover;
      border-radius: 10px;
      filter: drop-shadow(0 0 6px #001f5baa);
    }
    .boton {
      position: absolute;
      top: 50%;
      width: 40px;
      height: 40px;
      background: #001f5bcc;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transform: translateY(-50%);
      font-size: 24px;
      color: #e0e7ff;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      box-shadow: 0 0 8px #001f5baa;
      transition: background-color 0.3s ease;
    }
    .boton:hover {
      background: #003080ff;
      box-shadow: 0 0 16px #0040d2ff;
    }
    #prev { left: 10px; }
    #next { right: 10px; }

    /* Animación fadeIn */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Loader minimalista -->
  <div id="loader">
    Cargando ADARA
    <div id="progress-bar"><div></div></div>
    <span>Por favor espera...</span>
  </div>

<header>
  <button id="logo" title="Ir a inicio" aria-label="Ir a inicio" onclick="https://edsal0.github.io/ADARA/">
    <img src="https://github.com/EdSal0/images/raw/c2e10e2a5f9b40257387fc1b7865b16ce2395c45/logo.ico" alt="Logo" />
    ADARA
  </button>
  <div id="controls">
    <button id="ubicacionBtn" title="Mostrar sitio turístico cercano">
      <img src="https://github.com/EdSal0/images/raw/c2e10e2a5f9b40257387fc1b7865b16ce2395c45/ubi.ico" alt="Ubicación" />
      Mostrar sitio cercano
    </button>
    <button id="mundoBtn" title="Seleccionar país">
      <span class="icon">🌐</span>
      País
    </button>
    <div id="mensajeTuristicoHeader" title="Haz clic para ver más"></div>
    <div id="menuPaises"></div>
  </div>
</header>

<main>
  <h1>ADARA. TU BUSCADOR DE LUGARES FAVORITO</h1>
  <div class="carrusel">
    <img id="imagenActual" class="imagen-activa" src="" alt="Imagen" />
    <button class="boton" id="prev">&#9664;</button>
    <button class="boton" id="next">&#9654;</button>
  </div>
</main>

<script>
  const imagenActual = document.getElementById('imagenActual');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');
  const ubicacionBtn = document.getElementById('ubicacionBtn');
  const mensajeTuristicoHeader = document.getElementById('mensajeTuristicoHeader');
  const mundoBtn = document.getElementById('mundoBtn');
  const menuPaises = document.getElementById('menuPaises');
  const loader = document.getElementById('loader');

  // Array con las diapositivas: OJO que esto ya no usa querySelectorAll vacio
  const slides = [
    {
      src: 'https://www.escapadah.com/u/fotografias/m/2024/7/17/f768x1-43805_43932_5050.jpg',
      alt: 'Ángel de la Independencia',
      pais: 'México',
      url: 'paises/mexico.html',
      ancla: 'angel-independencia',
      onClick: function () {
        window.location.href = `${this.url}#${this.ancla}`;
      }
    },
    {
      src: 'https://i0.wp.com/historico.alcaldiacuauhtemoc.mx/wp-content/uploads/2018/09/Imagen-destacada-Monumento-a-la-Revolucio%CC%81n.jpg?fit=528%2C453&ssl=1',
      alt: 'Monumento a la Revolución',
      pais: 'México',
      url: 'paises/mexico.html',
      ancla: 'monumento-revolucion',
      onClick: function () {
        window.location.href = `${this.url}#${this.ancla}`;
      }
    },
    {
      src: 'https://tvazteca.brightspotcdn.com/9b/bb/c21bcce443a4a7bad262272b2da1/equinoccio-primavera-2023-turistas-piramides-teotihuacan.jpeg',
      alt: 'Pirámides de Teotihuacán',
      pais: 'México',
      url: 'paises/mexico.html',
      ancla: 'piramides-teotihuacan',
      onClick: function () {
        window.location.href = `${this.url}#${this.ancla}`;
      }
    },
    {
      src: 'https://visitmexico.com/media/usercontent/67fd35ff7bf1e-Exterior-Mexico-City-Metropolitan-Cathedral_gmxdot_jpg',
      alt: 'Catedral Metropolitana',
      pais: 'México',
      url: 'paises/mexico.html',
      ancla: 'catedral-metropolitana',
      onClick: function () {
        window.location.href = `${this.url}#${this.ancla}`;
      }
    },
    {
      src: 'https://inba.gob.mx/multimedia/prensa/galerias/14629/14629-IMG_BG_POST-palacio_de_bellas_artes_1.jpeg',
      alt: 'Palacio de Bellas Artes',
      pais: 'México',
      url: 'paises/mexico.html',
      ancla: 'bellas-artes',
      onClick: function () {
        window.location.href = `${this.url}#${this.ancla}`;
      }
    }
  ];

  const sitiosTuristicos = [
    { nombre: 'Catedral Metropolitana de Ciudad de México', lat: 19.4326, lon: -99.1332, url: 'paises/mexico.html', ancla: 'catedral-metropolitana' },
    { nombre: 'Museo Nacional de Antropología', lat: 19.4260, lon: -99.1860, url: 'paises/mexico.html', ancla: 'museo-antropologia' },
    { nombre: 'Castillo de Chapultepec', lat: 19.4204, lon: -99.1819, url: 'paises/mexico.html', ancla: 'castillo-chapultepec' },
    { nombre: 'Pirámides de Teotihuacán', lat: 19.6925, lon: -98.8438, url: 'paises/mexico.html', ancla: 'piramides-teotihuacan' },
    { nombre: 'Parque Chapultepec', lat: 19.4200, lon: -99.1830, url: 'paises/mexico.html', ancla: 'parque-chapultepec' },
  ];

  // Variables para el carrusel
  let slideIndex = 0;

  // Función para mostrar la diapositiva actual
  function mostrarSlide(index) {
    if (index < 0) slideIndex = slides.length - 1;
    else if (index >= slides.length) slideIndex = 0;
    else slideIndex = index;

    const slide = slides[slideIndex];
    imagenActual.src = slide.src;
    imagenActual.alt = slide.alt;
  }

  // Al hacer clic en la imagen, ejecuta el método onClick del slide actual
  imagenActual.addEventListener('click', () => {
    slides[slideIndex].onClick();
  });

  // Botones prev y next
  prevBtn.addEventListener('click', () => {
    mostrarSlide(slideIndex - 1);
  });
  nextBtn.addEventListener('click', () => {
    mostrarSlide(slideIndex + 1);
  });

  // Inicializar carrusel mostrando la primera imagen
  mostrarSlide(slideIndex);

  // Función para calcular distancia entre dos coordenadas en km (Haversine)
  function calcularDistancia(lat1, lon1, lat2, lon2) {
    const R = 6371; // Radio de la Tierra en km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  // Mostrar sitio turístico cercano
  ubicacionBtn.addEventListener('click', () => {
    if (!navigator.geolocation) {
      alert('Geolocalización no soportada por este navegador.');
      return;
    }
    navigator.geolocation.getCurrentPosition(pos => {
      const latUser = pos.coords.latitude;
      const lonUser = pos.coords.longitude;

      let sitioCercano = null;
      let minDist = Infinity;

      sitiosTuristicos.forEach(sitio => {
        const dist = calcularDistancia(latUser, lonUser, sitio.lat, sitio.lon);
        if (dist < minDist) {
          minDist = dist;
          sitioCercano = sitio;
        }
      });

      if (sitioCercano) {
        mensajeTuristicoHeader.innerHTML = `Sitio turístico más cercano: <a href="${sitioCercano.url}#${sitioCercano.ancla}" target="_blank">${sitioCercano.nombre}</a>`;
        mensajeTuristicoHeader.classList.add('show');
      } else {
        mensajeTuristicoHeader.textContent = 'No se encontró un sitio turístico cercano.';
        mensajeTuristicoHeader.classList.add('show');
      }
    }, err => {
      alert('Error al obtener ubicación: ' + err.message);
    });
  });

  // Ocultar mensaje al hacer clic
  mensajeTuristicoHeader.addEventListener('click', () => {
    mensajeTuristicoHeader.classList.remove('show');
  });

  // Mostrar menú de países al hacer clic en botón mundo
  mundoBtn.addEventListener('click', () => {
    if (menuPaises.style.display === 'block') {
      menuPaises.style.display = 'none';
    } else {
      mostrarMenuPaises();
      menuPaises.style.display = 'block';
    }
  });

  // Cerrar menú si se hace clic afuera
  document.addEventListener('click', (e) => {
    if (!mundoBtn.contains(e.target) && !menuPaises.contains(e.target)) {
      menuPaises.style.display = 'none';
    }
  });

  // Lista de países con enlaces y anclas (ejemplo)
  const paises = [
    { nombre: 'México', url: 'paises/mexico.html' },
    { nombre: 'Estados Unidos', url: 'paises/usa.html' },
    { nombre: 'Canadá', url: 'paises/canada.html' },
    { nombre: 'Brasil', url: 'paises/brasil.html' },
    { nombre: 'Argentina', url: 'paises/argentina.html' },
  ];

  function mostrarMenuPaises() {
    menuPaises.innerHTML = '';
    paises.forEach(pais => {
      const btn = document.createElement('button');
      btn.textContent = pais.nombre;
      btn.addEventListener('click', () => {
        window.location.href = pais.url;
      });
      menuPaises.appendChild(btn);
    });
  }

  // Simulación de carga para ocultar loader
  window.addEventListener('load', () => {
    setTimeout(() => {
      loader.style.display = 'none';
    }, 1500);
  });
</script>
</body>
</html>
